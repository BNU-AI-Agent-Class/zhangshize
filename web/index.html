<style>
:root{--cream:#FFFDF7;--ink:#1A1A1A;--red:#E8352E;--yellow:#FFF1B8;--grey:#555;--line:#1A1A1A}

body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--cream);color:var(--ink);line-height:1.6}

.node .nt{font-size:13px;font-weight:700}.node .ns{font-size:11px;color:var(--grey)}

h2{font-size:26px;margin:4px 0 2px}.sub{color:var(--grey);font-size:15px;margin-bottom:18px}
.goal{background:var(--yellow);border:2px solid var(--line);box-shadow:4px 4px 0 var(--ink);padding:14px 18px;border-radius:10px;margin-bottom:20px;font-size:15px}
.sec{margin-bottom:22px}.sec h3{font-size:14px;color:var(--red);margin-bottom:8px}
.cc{background:#fff;border:2px solid var(--line);border-left:8px solid var(--red);border-radius:10px;padding:13px 18px;margin-bottom:22px}
.cc .cch{font-weight:700;font-size:14px;margin-bottom:3px}.cc .cch b{color:var(--red)}
.cc .ccd{font-size:13.5px;color:#333}

.ln{color:#666;user-select:none;display:inline-block;width:26px;text-align:right;margin-right:14px}
.hl{background:rgba(232,53,46,.22);display:block;margin:0 -16px;padding:0 16px;border-left:3px solid var(--red)}

.nav{display:flex;justify-content:space-between;margin-top:30px;padding-top:18px;border-top:2px solid var(--line)}
.nav button{font-family:inherit;font-size:14px;font-weight:700;padding:10px 18px;border:2px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
.nav button:active{box-shadow:0 0 0;transform:translate(3px,3px)}.nav button:disabled{opacity:.3;cursor:default;box-shadow:none}
@media(max-width:760px){.wrap{flex-direction:column}.rail{width:auto;height:auto;position:static;border-right:none;border-bottom:2px solid var(--line);display:flex;flex-wrap:wrap}.main{padding:20px}}

<script>
const DATA = [{"id": "c0", "title": "JSON 协议", "sub": "让机器听得懂机器", "goal": "把 s3 的\"命令:/完成:\"文本协议,升级成结构化 JSON。", "file": "c0_json.py", "code": "# 对照真 Claude Code：这一步 = tool_use（模型返回结构化工具调用，我们用手写 JSON 做极简版）\nfrom dotenv import load_dotenv; load_dotenv()                       # 1. 读取 .env 里的 API 密钥（和昨天 s3 一样）\nfrom openrouter import OpenRouter                                   # 2. 导入 OpenRouter SDK\nimport os, json                                                     # 3. os 执行命令；json 解析结构化协议\n\nSYSTEM = \"\"\"你是一个编程助手。每次只回复一个 JSON，不要有别的文字，不要用 markdown 包裹；字符串值里别用英文双引号，要引用就用「」：\n- 要执行命令时：{\"tool\": \"bash\", \"args\": {\"cmd\": \"要执行的命令\"}}\n- 任务完成时：  {\"done\": \"给用户的总结\"}\"\"\"                             # 4. 系统提示词：把 s3 的\"命令:/完成:\"文本协议，升级成 JSON 协议\n\nwith OpenRouter(api_key=os.getenv(\"OPENROUTER_API_KEY\")) as client: # 5. 创建客户端\n    messages = [{\"role\": \"system\", \"content\": SYSTEM}]             # 6. 对话历史，第一条是系统提示\n    while True:                                                     # 7. 外层循环：等用户下达新任务\n        messages.append({\"role\": \"user\", \"content\": input(\"\\n你：\")})  # 8. 用户输入存入历史\n        while True:                                                 # 9. 内层循环：Agent 自主执行直到完成\n            reply = client.chat.send(model=\"anthropic/claude-opus-4.6\",\n                                     messages=messages).choices[0].message.content  # 10. 调用模型，取回复\n            messages.append({\"role\": \"assistant\", \"content\": reply})# 11. AI 回复存入历史\n            action = json.loads(reply)                              # 12. 关键升级：把 JSON 文本解析成 Python 字典\n            if \"done\" in action:                                    # 13. 如果是完成信号 → 跳出内层循环\n                print(f\"[完成] {action['done']}\"); break\n            cmd = action[\"args\"][\"cmd\"]                             # 14. 从结构化字段里取命令（不再靠字符串切割）\n            print(f\"[执行] {cmd}\")\n            result = os.popen(cmd).read()                           # 15. 执行命令\n            print(f\"[结果] {result}\")\n            messages.append({\"role\": \"user\", \"content\": f\"命令输出：\\n{result}\"})  # 16. 把结果反馈给 AI\n# MIT License | 郑先隽，北师大心理学部教授，人本AI设计与创新\n", "highlight": ["json 模块", "json.loads(reply)"], "cc": {"name": "tool_use 结构化输入", "desc": "真 Claude Code 里,模型不是吐一段文字让你切,而是直接返回结构化的工具调用(tool_use)。我们手写的 JSON,就是它的极简版。"}, "simple": {"cmd": "你：列出 demo_project 里所有文件", "why": "一句命令、没引号没换行,昨天 s3 的文本协议也能切对——这时你看不出 JSON 有啥好。"}, "complex": {"cmd": "你：在 demo_project 写一个 hello.py，内容是 print(\"你好, world\")", "why": "内容里一带引号、冒号、换行,s3 的 split(\"命令:\") 就切歪了。JSON 用 {} 把\"做什么\"和\"内容\"分得清清楚楚——这就是结构化协议的意义。"}, "verify": ["看到 [执行] → [结果] → [完成]", "带引号的内容也能正确写进文件"], "think": "让 c0 往文件里写一段带很多引号的 Python 代码,看它出没出错。为什么结构化 JSON 能避免昨天 s3 的切割歧义?"}, {"id": "c1", "title": "工具箱 + 加固", "sub": "不止一把锤子,还不怕崩", "goal": "加 read_file / write_file,按名字派发;parse()+try/except 修好 c0 的崩溃。", "file": "c1_toolbox.py", "code": "# 对照真 Claude Code：这一步 = Read / Write / Bash 等专用工具（比全用 bash 更可控、可审计）\nfrom dotenv import load_dotenv; load_dotenv()                       # 1. 读取 .env 里的 API 密钥\nfrom openrouter import OpenRouter                                   # 2. 导入 OpenRouter SDK\nimport os, json                                                     # 3. os 执行命令；json 解析协议\n\ndef read_file(path):  return open(path, encoding=\"utf-8\").read()   # 4. 工具：读文件（真 Claude Code 的 Read）\ndef write_file(path, text):                                        # 5. 工具：写文件（真 Claude Code 的 Write）\n    open(path, \"w\", encoding=\"utf-8\").write(text); return f\"已写入 {path}\"\ndef bash(cmd):        return os.popen(cmd).read()                  # 6. 工具：执行命令（真 Claude Code 的 Bash）\nTOOLS = {\"read_file\": read_file, \"write_file\": write_file, \"bash\": bash}  # 7. 工具箱：名字 → 函数\ndef parse(s):                                                      # 7b. 容错解析：模型偶尔会用 ```json 包裹（这就是 c0 有时崩的原因），剥掉再解析\n    s = s.strip().strip(\"`\").removeprefix(\"json\").strip(); return json.loads(s[s.find(\"{\"): s.rfind(\"}\") + 1])\n\nSYSTEM = \"\"\"你是一个编程助手。每次只回复一个 JSON，不要别的文字，不要 markdown 包裹；字符串值里别用英文双引号，要引用就用「」：\n- 读文件：{\"tool\": \"read_file\", \"args\": {\"path\": \"...\"}}\n- 写文件：{\"tool\": \"write_file\", \"args\": {\"path\": \"...\", \"text\": \"...\"}}\n- 执行命令：{\"tool\": \"bash\", \"args\": {\"cmd\": \"...\"}}\n- 完成时：{\"done\": \"总结\"}\n优先用 read_file / write_file 处理文件，它们比 bash 更安全可控。\"\"\"  # 8. 系统提示：告诉模型有哪些工具、何时用\n\nwith OpenRouter(api_key=os.getenv(\"OPENROUTER_API_KEY\")) as client: # 9. 创建客户端\n    messages = [{\"role\": \"system\", \"content\": SYSTEM}]             # 10. 对话历史\n    while True:                                                     # 11. 外层循环：等新任务\n        messages.append({\"role\": \"user\", \"content\": input(\"\\n你：\")})\n        while True:                                                 # 12. 内层循环：自主执行\n            reply = client.chat.send(model=\"anthropic/claude-opus-4.6\",\n                                     messages=messages).choices[0].message.content\n            messages.append({\"role\": \"assistant\", \"content\": reply})\n            try:                              # 13. 解析 JSON\n                action = parse(reply)\n            except Exception:                              # 坏格式不崩：请模型重发（这就是加固）\n                messages.append({\"role\": \"user\", \"content\": \"上一条不是合法 JSON，请只回一个 JSON，别的都不要\"}); continue\n            if \"done\" in action:                                    # 14. 完成 → 跳出\n                print(f\"[完成] {action['done']}\"); break\n            name, args = action[\"tool\"], action[\"args\"]            # 15. 取出工具名和参数\n            print(f\"[调用] {name}({args})\")\n            result = TOOLS[name](**args)                            # 16. 关键升级：按名字派发到对应工具函数\n            print(f\"[结果] {result}\")\n            messages.append({\"role\": \"user\", \"content\": f\"工具返回：\\n{result}\"})  # 17. 结果反馈\n# MIT License | 郑先隽，北师大心理学部教授，人本AI设计与创新\n", "highlight": ["def read_file", "def write_file", "TOOLS = {", "def parse(", "except Exception", "TOOLS[name](**args)"], "cc": {"name": "Read / Write / Bash 工具", "desc": "真 Claude Code 有几十个专用工具。为什么不全用 bash?因为专用工具能限制路径、记录每次读写、避开 shell 转义地狱——更可控、可审计。"}, "simple": {"cmd": "你：把「测试」写进 demo_project/tmp.txt", "why": "就写一个文件,bash 的 echo 也能干,read_file / write_file 好像多此一举。"}, "complex": {"cmd": "你：把 demo_project/TODO.md 第一条待办从 [ ] 改成 [x]", "why": "要精确改一行,用 bash 的 sed 得跟转义、特殊字符搏斗,还可能误伤别的行;read_file 读出来→想清楚→write_file 写回去,干净可控。这就是 CC 有专门 Read/Write 的原因。"}, "verify": ["[调用] write_file / read_file 分开出现", "TODO.md 只有目标那行被改,其它行没动"], "think": "同样是改 TODO.md 一行,让 c1 用 write_file 做一次。再想:如果改用 bash 的 sed,遇到行里有特殊符号会出什么岔子?"}, {"id": "c2", "title": "计划是工具", "sub": "TodoWrite", "goal": "让 agent 先列计划、边做边勾,把思考过程变可见。", "file": "c2_todo.py", "code": "# 对照真 Claude Code：这一步 = TodoWrite（让模型把计划写进一个能反复更新的工具）\nfrom dotenv import load_dotenv; load_dotenv()                       # 1. 读取 API 密钥\nfrom openrouter import OpenRouter                                   # 2. 导入 SDK\nimport os, json                                                     # 3. os / json\n\nTODOS = []                                                          # 4. 全局任务清单（就是 Claude Code 里的 TodoWrite）\ndef read_file(path):  return open(path, encoding=\"utf-8\").read()   # 5. 工具：读文件\ndef write_file(path, text):\n    open(path, \"w\", encoding=\"utf-8\").write(text); return f\"已写入 {path}\"\ndef bash(cmd):        return os.popen(cmd).read()                  # 6. 工具：执行命令\ndef todo_write(items):                                             # 7. 工具：更新任务清单\n    global TODOS; TODOS = items                                     #    items 形如 [{\"task\":\"...\",\"done\":false}, ...]\n    board = \"\\n\".join(f\"  {'☑' if t['done'] else '☐'} {t['task']}\" for t in TODOS)\n    print(f\"[计划]\\n{board}\"); return \"清单已更新\"                    #    打印带勾选框的清单，让\"思考\"可见\nTOOLS = {\"read_file\": read_file, \"write_file\": write_file, \"bash\": bash, \"todo_write\": todo_write}  # 8. 工具箱\n\ndef parse(s):                                                      # 容错解析：剥掉模型偶尔加的 ```json 包裹\n    s = s.strip().strip(\"`\").removeprefix(\"json\").strip(); return json.loads(s[s.find(\"{\"): s.rfind(\"}\") + 1])\nSYSTEM = \"\"\"你是一个编程助手。每次只回复一个 JSON，不要别的文字，不要 markdown；字符串值里别用英文双引号，要引用就用「」：\n- 规划：{\"tool\": \"todo_write\", \"args\": {\"items\": [{\"task\": \"步骤A\", \"done\": false}, ...]}}\n- 读文件：{\"tool\": \"read_file\", \"args\": {\"path\": \"...\"}}\n- 写文件：{\"tool\": \"write_file\", \"args\": {\"path\": \"...\", \"text\": \"...\"}}\n- 执行命令：{\"tool\": \"bash\", \"args\": {\"cmd\": \"...\"}}\n- 完成：{\"done\": \"总结\"}\n接到多步任务时，先用 todo_write 列出计划；每完成一步就用 todo_write 更新勾选状态。\"\"\"  # 9. 要求\"先列计划再动手\"\n\nwith OpenRouter(api_key=os.getenv(\"OPENROUTER_API_KEY\")) as client: # 10. 客户端\n    messages = [{\"role\": \"system\", \"content\": SYSTEM}]             # 11. 历史\n    while True:                                                     # 12. 外层循环\n        messages.append({\"role\": \"user\", \"content\": input(\"\\n你：\")})\n        while True:                                                 # 13. 内层循环\n            reply = client.chat.send(model=\"anthropic/claude-opus-4.6\",\n                                     messages=messages).choices[0].message.content\n            messages.append({\"role\": \"assistant\", \"content\": reply})\n            try:                              # 14. 解析\n                action = parse(reply)\n            except Exception:                              # 坏格式不崩：请模型重发（这就是加固）\n                messages.append({\"role\": \"user\", \"content\": \"上一条不是合法 JSON，请只回一个 JSON，别的都不要\"}); continue\n            if \"done\" in action:\n                print(f\"[完成] {action['done']}\"); break\n            name, args = action[\"tool\"], action[\"args\"]\n            result = TOOLS[name](**args)                            # 15. 派发（todo_write 也是一个普通工具！）\n            if name != \"todo_write\": print(f\"[调用] {name} → {result}\")\n            messages.append({\"role\": \"user\", \"content\": f\"工具返回：\\n{result}\"})\n# MIT License | 郑先隽，北师大心理学部教授，人本AI设计与创新\n", "highlight": ["def todo_write", "TODOS", "☑", "☐"], "cc": {"name": "TodoWrite 工具", "desc": "你用 Claude Code 做多步任务时,它会先列一张待办清单、逐条打勾。那就是 TodoWrite——和我们这几行本质一样:让模型把计划写进一个能反复更新的工具。"}, "simple": {"cmd": "你：给 demo_project 加一个空文件 draft.txt", "why": "一步就完事,列不列计划都一样。"}, "complex": {"cmd": "你：给 notes_app 加一个 export 命令，把所有笔记导出成 markdown", "why": "这要读 cli.py、改 cli.py、可能加函数、再测试——好几步。没有计划,agent 容易漏掉\"测试\"或改错顺序。todo_write 让它先排步骤、边做边勾,你也能盯着它别跑偏。"}, "verify": ["先打印一张 ☐ 清单", "每完成一步 ☐ 变 ☑,顺序合理"], "think": "让 c2 做\"给 notes_app 加 export 命令\",看它列了哪几步。如果不让它先列计划,你猜它最容易漏掉哪一步?"}, {"id": "c3", "title": "子智能体", "sub": "把脏活外包", "goal": "派一个有独立上下文的子 agent 去干脏活,只拿回摘要。", "file": "c3_subagent.py", "code": "# 对照真 Claude Code：这一步 = Task / 子 agent（派子任务去探索，只拿回摘要，保持主上下文干净）\nfrom dotenv import load_dotenv; load_dotenv()                       # 1. 读取 API 密钥\nfrom openrouter import OpenRouter                                   # 2. 导入 SDK\nimport os, json                                                     # 3. os / json\n\nclient = OpenRouter(api_key=os.getenv(\"OPENROUTER_API_KEY\"))        # 4. 客户端设为全局，主/子 agent 共用\nMODEL = \"anthropic/claude-opus-4.6\"\n\ndef read_file(path):  return open(path, encoding=\"utf-8\").read()   # 5. 工具：读文件\ndef bash(cmd):        return os.popen(cmd).read()                  # 6. 工具：执行命令\ndef subagent(task):                                                # 7. 工具：派一个\"子智能体\"独立完成一件事\n    sub = [{\"role\": \"system\", \"content\": \"你是子助手，用 JSON 干活：\"        #    关键：子 agent 有自己全新的 messages\n            '{\"tool\":\"bash\",\"args\":{\"cmd\":\"...\"}} 或 {\"done\":\"结论\"}'},   #    ——它的探索过程不会污染主对话\n           {\"role\": \"user\", \"content\": task}]\n    while True:                                                     # 8. 子 agent 自己的内层循环\n        r = client.chat.send(model=MODEL, messages=sub).choices[0].message.content\n        sub.append({\"role\": \"assistant\", \"content\": r})\n        try: a = parse(r)                                          # 子 agent 也加固：坏格式就重发\n        except Exception: sub.append({\"role\": \"us let cur = 0;
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function codeHTML(d){
  return d.code.split("\n").map(function(ln,i){
    var e=esc(ln), hit=d.highlight.some(function(h){return ln.indexOf(h)>=0});
    var num='<span class="ln">'+(i+1)+'</span>';
    return hit?'<span class="hl">'+num+e+'</span>':num+e;
  }).join("\n");
}
function renderRail(){
  document.getElementById("rail").innerHTML=DATA.map(function(d,i){
    return '<div class="node '+(i===cur?"active":"")+'" onclick="go('+i+')"><div class="dot">'+d.id+'</div><div><div class="nt">'+d.title+'</div><div class="ns">'+d.sub+'</div></div></div>';
  }).join("");
}

      '<div class="demonote">📁 下面的 <b>🔥 复杂例子</b>都在 <b>demo_project</b> 上跑——一个特意准备的真实小项目（多文件 + 一个藏起来的 bug）。这些机制只有在真实项目上才显价值：<b>简单任务用不上，复杂项目离不开</b>。先 <code>cat demo_project/README.md</code> 逛一圈。</div>'+
      '<div class="ex">'+
        '<div class="card s"><div class="h">😌 简单任务 · 看不出必要</div><pre class="run">'+esc(d.simple.cmd)+'</pre><div class="why">'+d.simple.why+'</div></div>'+
        '<div class="card c"><div class="h">🔥 复杂任务 · 痛点凸显</div><pre class="run">'+esc(d.complex.cmd)+'</pre><div class="why">'+d.complex.why+'</div></div>'+
